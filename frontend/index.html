<!DOCTYPE html>
<html>
<head>
    <title>Sumas API</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: linear-gradient(135deg, #667eea, #764ba2); margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; max-width: 400px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #5a6fd6; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; background: #f5f5f5; }
        .exito { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="titulo">🔄 Conectando...</h1>
        <input type="number" id="num1" placeholder="Número 1">
        <input type="number" id="num2" placeholder="Número 2">
        <button id="btn">➕ Sumar</button>
        <div id="resultado">Esperando operación...</div>
        <p style="font-size: 12px; color: #999; margin-top: 10px;">Backend: <span id="status">verificando...</span></p>
    </div>

    <script>
        // PRUEBA CON AMBOS PUERTOS
        const PUERTOS = [3000, 3001, 3002];
        let API_URL = 'http://localhost:3000';
        
        const num1 = document.getElementById('num1');
        const num2 = document.getElementById('num2');
        const btn = document.getElementById('btn');
        const resultado = document.getElementById('resultado');
        const titulo = document.getElementById('titulo');
        const status = document.getElementById('status');

        // Buscar qué puerto funciona
        async function buscarServidor() {
            for (const puerto of PUERTOS) {
                try {
                    const url = `http://localhost:${puerto}`;
                    const res = await fetch(url);
                    if (res.ok) {
                        API_URL = url;
                        status.textContent = `✅ Conectado al puerto ${puerto}`;
                        status.style.color = 'green';
                        const data = await res.json();
                        titulo.textContent = data.mensaje || 'Sumas API';
                        return;
                    }
                } catch (e) {
                    // Intentar siguiente puerto
                }
            }
            status.textContent = '❌ No se encontró el servidor';
            status.style.color = 'red';
            titulo.textContent = '❌ Servidor no disponible';
        }

        // Sumar
        async function sumar() {
            const n1 = num1.value.trim();
            const n2 = num2.value.trim();

            if (!n1 || !n2) {
                resultado.textContent = '❌ Llena ambos campos';
                resultado.className = 'error';
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳...';
            resultado.textContent = 'Calculando...';
            resultado.className = '';

            try {
                const res = await fetch(`${API_URL}/sumar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ num1: Number(n1), num2: Number(n2) })
                });

                const data = await res.json();

                if (!res.ok) throw new Error('Error en el servidor');

                resultado.innerHTML = `✅ ${n1} + ${n2} = <strong>${data.resultado}</strong>`;
                resultado.className = 'exito';

            } catch (error) {
                resultado.textContent = `❌ ${error.message}`;
                resultado.className = 'error';
            }

            btn.disabled = false;
            btn.textContent = '➕ Sumar';
        }

        btn.addEventListener('click', sumar);
        num1.addEventListener('keypress', e => e.key === 'Enter' && sumar());
        num2.addEventListener('keypress', e => e.key === 'Enter' && sumar());

        // Iniciar
        buscarServidor();
    </script>
</body>
</html>
